[project]
name = "tongue-frontend"
version = "0.1.0"
description = "Streamlit frontend for tongue diagnosis"
requires-python = ">=3.11"
dependencies = [
    "streamlit>=1.31",
    "tongue-backend",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tongue_frontend"]

[tool.uv.sources]
tongue-backend = { workspace = true }

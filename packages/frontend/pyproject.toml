[project]
name = "tongue-frontend"
version = "0.1.0"
description = "Gradio frontend for tongue diagnosis"
requires-python = ">=3.11"
dependencies = [
    "gradio>=4",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tongue_frontend"]

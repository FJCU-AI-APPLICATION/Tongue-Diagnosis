[project]
name = "tongue-backend"
version = "0.1.0"
description = "FastAPI backend for tongue diagnosis service"
requires-python = ">=3.11"
dependencies = [
    "fastapi>=0.110",
    "uvicorn[standard]>=0.27",
    "python-multipart>=0.0.9",
    "pyyaml>=6",
    "pydantic-settings>=2",
    "google-genai>=1.0",
    "tongue-ai",
]

[project.optional-dependencies]
dev = ["pytest>=8"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/tongue_backend"]

[tool.pytest.ini_options]
pythonpath = ["src", "../ai/src"]

[tool.uv.sources]
tongue-ai = { workspace = true }
